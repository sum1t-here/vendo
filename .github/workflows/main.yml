name: CI

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main']

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Run eslint
        run: bun run lint

      - name: Run prettier
        run: bun run format:check

      - name: Build
        run: bun run build
